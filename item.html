<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | 7 Islands</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><nav><div class="logo" onclick="window.location.href='index.html'">7 ISLANDS</div></nav></header>
    <div class="detail-view-container">
        <div id="itemDetail"></div>
        <div class="related-section">
            <h2 class="section-title">RELATED <span class="gold-text">ITEMS</span></h2>
            <div class="sport-grid" id="relatedGrid"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const itemTitle = params.get('name');

        async function loadDetail() {
            const query = encodeURIComponent(`*[_type == "memorabilia" && title == "${itemTitle}"][0]{
                title, year, "venueName": venue->name, description, coaProvider, serialNumber,
                "imageUrl": image.asset->url, "itemType": itemType->name, "sportNames": sports[]->name, 
                "athleteNames": sportsmen[]->name, "teamNames": teams[]->name
            }`);
            const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
            const {result} = await resp.json();

            if (result) {
                document.title = `${result.title} | 7 Islands`;
                
                let metaHTML = "";
                if(result.venueName) metaHTML += `<p class="clickable" onclick="goToFilter('venue','${result.venueName}')">📍 <strong>Venue:</strong> ${result.venueName}</p>`;
                if(result.teamNames) metaHTML += `<p>👥 <strong>Teams:</strong> ${result.teamNames.map(t => `<span class="clickable" onclick="goToFilter('team','${t}')">${t}</span>`).join(', ')}</p>`;
                if(result.coaProvider) metaHTML += `<p>🛡️ <strong>Auth:</strong> ${result.coaProvider}</p>`;
                if(result.serialNumber) metaHTML += `<p>🆔 <strong>Serial:</strong> ${result.serialNumber}</p>`;

                document.getElementById('itemDetail').innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-image"><img src="${result.imageUrl}" alt="${result.title}"></div>
                        <div class="detail-content">
                            <p class="gold-text">
                                <span class="clickable" onclick="goToFilter('type','${result.itemType}')">${result.itemType || ''}</span> 
                                ${result.year ? `• <span class="clickable" onclick="goToFilter('year','${result.year}')">${result.year}</span>` : ''}
                            </p>
                            <h1>${result.title}</h1>
                            <div class="detail-athletes">
                                ${result.athleteNames ? result.athleteNames.map(a => `<span class="clickable" onclick="goToFilter('athlete','${a}')">${a}</span>`).join(', ') : ''}
                            </div>
                            ${metaHTML ? `<div class="detail-meta-box">${metaHTML}</div>` : ''}
                            <p class="detail-desc">${result.description || ''}</p>
                            <div class="tags-row" style="margin-top:20px;">
                                ${result.sportNames ? result.sportNames.map(s => `<span class="clickable-tag clickable" onclick="goToFilter('sport','${s}')">${s}</span>`).join('') : ''}
                            </div>
                        </div>
                    </div>`;
                
                // Fetch Related items
                const rQuery = encodeURIComponent(`*[_type == "memorabilia" && sports[0]->name == "${result.sportNames[0]}" && title != "${itemTitle}"][0...4]{
                    title, year, "imageUrl": image.asset->url, "itemTypeName": itemType->name, "sportNames": sports[]->name, "athleteNames": sportsmen[]->name
                }`);
                const rResp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${rQuery}`);
                const {result: related} = await rResp.json();
                related.forEach(item => document.getElementById('relatedGrid').appendChild(createCard(item)));
            }
        }
        loadDetail();
    </script>
</body>
</html>
