<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Item | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">7 ISLANDS</div>
            <ul class="nav-links">
                <li><a href="index.html">The Vault</a></li>
                <li><a href="celebrities.html">Legends</a></li>
                <li><a href="index.html#latest">Latest</a></li>
            </ul>
        </nav>
    </header>

    <div class="detail-view-container">
        <div id="itemDetail">
            <p style="text-align: center; padding: 50px;">Loading Archive Data...</p>
        </div>
        
        <div class="related-section">
            <h2 class="section-title">RELATED <span class="gold-text">ITEMS</span></h2>
            <div class="sport-grid" id="relatedGrid"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const itemTitle = params.get('name');

        async function loadDetail() {
            if (!itemTitle) return;

            const query = encodeURIComponent(`*[_type == "memorabilia" && title == "${itemTitle}"][0]{
                title, year, "venueName": venue->name, "venueLoc": venue->location,
                description, coaProvider, serialNumber, isMatchWorn,
                "imageUrl": image.asset->url, "itemType": itemType->name,
                "athleteNames": sportsmen[]->name, "sportNames": sports[]->name, "teamNames": teams[]->name
            }`);
            
            try {
                const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                const {result} = await resp.json();

                if (result) {
                    // --- DYNAMIC SEO PAGE TITLE ---
                    const athletes = result.athleteNames ? result.athleteNames.join(', ') : '';
                    const sports = result.sportNames ? result.sportNames.join(', ') : '';
                    const type = result.itemType || '';
                    
                    const titleParts = [athletes, sports, type].filter(Boolean).join(' - ');
                    document.title = titleParts 
                        ? `${titleParts} | 7 Islands Memorabilia` 
                        : `${result.title} | 7 Islands Memorabilia`;
                    // ------------------------------
                    
                    let metaHTML = "";
                    if(result.venueName) metaHTML += `<p style="cursor:pointer;" onclick="goToFilter('venue','${result.venueName}')">📍 <strong style="color:white;">Venue:</strong> ${result.venueName} ${result.venueLoc ? '(' + result.venueLoc + ')' : ''}</p>`;
                    if(result.teamNames) metaHTML += `<p>👥 <strong style="color:white;">Teams:</strong> ${result.teamNames.map(t => `<span style="cursor:pointer; color:var(--gold);" onclick="goToFilter('team','${t}')">${t}</span>`).join(', ')}</p>`;
                    if(result.coaProvider) metaHTML += `<p>🛡️ <strong style="color:white;">Authentication:</strong> ${result.coaProvider}</p>`;
                    if(result.serialNumber) metaHTML += `<p>🆔 <strong style="color:white;">Serial:</strong> ${result.serialNumber}</p>`;

                    document.getElementById('itemDetail').innerHTML = `
                        <div class="detail-grid">
                            <div class="detail-image">
                                <img src="${result.imageUrl}" alt="${result.title}">
                                ${result.isMatchWorn ? '<span style="position:absolute; top:20px; left:20px; background:#8B0000; color:white; padding:5px 15px; font-weight:900; border-radius:4px; border:1px solid var(--gold); letter-spacing:1px; z-index:10;">MATCH USED</span>' : ''}
                            </div>
                            <div class="detail-content">
                                <p class="gold-text" style="font-weight:900; letter-spacing:1px; font-size:0.8rem; margin-bottom:10px;">
                                    <span style="cursor:pointer;" onclick="goToFilter('type','${result.itemType}')">${result.itemType || 'Archive'}</span> 
                                    ${result.year ? `• <span style="cursor:pointer;" onclick="goToFilter('year','${result.year}')">${result.year}</span>` : ''}
                                </p>
                                <h1 style="color:white;">${result.title}</h1>
                                <div class="detail-athletes" style="margin-bottom:25px; margin-top:10px;">
                                    ${result.athleteNames ? result.athleteNames.map(a => `<span style="cursor:pointer; color:var(--gold); font-size:1.3rem; font-weight:700; margin-right:15px; text-decoration:underline;" onclick="goToFilter('athlete','${a}')">${a}</span>`).join('') : ''}
                                </div>
                                ${metaHTML ? `<div class="detail-meta-box" style="color:var(--gold);">${metaHTML}</div>` : ''}
                                <p class="detail-desc" style="line-height:1.8; opacity:0.85;">${result.description || 'No description available for this item in the vault.'}</p>
                                <div class="tags-row" style="margin-top:30px; border-top:1px solid rgba(212,175,55,0.2); padding-top:20px;">
                                    ${result.sportNames ? result.sportNames.map(s => `<span class="clickable-tag" style="background:rgba(212,175,55,0.1); color:var(--gold); padding:6px 14px; border-radius:4px; font-size:0.75rem; font-weight:900; margin-right:8px; cursor:pointer;" onclick="goToFilter('sport','${s}')">${s}</span>`).join('') : ''}
                                </div>
                            </div>
                        </div>`;
                    
                    // Fetch Related Items
                    if (result.sportNames && result.sportNames.length > 0) {
                        const rQuery = encodeURIComponent(`*[_type == "memorabilia" && sports[0]->name == "${result.sportNames[0]}" && title != "${itemTitle}"][0...4]{
                            title, year, "imageUrl": image.asset->url, "itemType": itemType->name, "sportNames": sports[]->name, "athleteNames": sportsmen[]->name
                        }`);
                        const rResp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${rQuery}`);
                        const {result: related} = await rResp.json();
                        if(related) {
                            const grid = document.getElementById('relatedGrid');
                            related.forEach(item => grid.appendChild(createCard(item)));
                        }
                    }
                }
            } catch (e) { console.error("Item Load Error:", e); }
        }
        
        loadDetail();
    </script>
</body>
</html>
