<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Item | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker" id="dynamic-ticker">LOADING THE ARCHIVE • </div></div>
    </div>
    <div id="navbar-placeholder"></div>

    <div class="detail-view-container section-padding" style="max-width: 1400px; margin: 0 auto; padding-top: 40px;">
        <div id="breadcrumb" style="margin-bottom: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></div>
        <div id="itemDetail"><p style="text-align: center; padding: 50px; opacity: 0.5;">Loading Archive Data...</p></div>
        
        <div id="relatedSection" style="display: none; margin-top: 4rem;">
            <h2 class="section-title" style="text-align: left;">RELATED <span class="gold-text">ITEMS</span></h2>
            <div class="sport-grid six-grid" id="relatedGrid"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const itemTitle = params.get('name');

        async function loadDetail() {
            if (!itemTitle) return;

            const query = encodeURIComponent(`*[_type == "memorabilia" && title == "${itemTitle}"][0]{
                title, year, "venueName": venue->name, description, coaProvider, serialNumber, isMatchWorn,
                "imageUrl": image.asset->url, "itemType": itemType->name,
                "athleteNames": sportsmen[]->name, "sportNames": sports[]->name, "teamNames": teams[]->name
            }`);
            
            try {
                const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                const {result} = await resp.json();

                if (result) {
                    const athletes = result.athleteNames ? result.athleteNames.join(', ') : '';
                    document.title = `${athletes} | 7 Islands Memorabilia`;
                    
                    document.getElementById('breadcrumb').innerHTML = `<a href="index.html" style="color:var(--gold); text-decoration:none;">Home</a> <span style="margin: 0 10px; opacity: 0.4;">/</span> <a href="vault.html" style="color:var(--gold); text-decoration:none;">Vault</a> <span style="margin: 0 10px; opacity: 0.4;">/</span> <span style="color:white; opacity: 0.7;">${result.title}</span>`;

                    let metaHTML = "";
                    if(result.venueName) metaHTML += `<p>📍 <strong style="color:white;">Venue:</strong> <a href="filter.html?venue=${encodeURIComponent(result.venueName)}" style="color:var(--gold); text-decoration:underline;">${result.venueName}</a></p>`;
                    if(result.teamNames && result.teamNames.length > 0) metaHTML += `<p>👥 <strong style="color:white;">Teams:</strong> ${result.teamNames.map(t => `<a href="filter.html?team=${encodeURIComponent(t)}" style="color:var(--gold); text-decoration:underline;">${t}</a>`).join(', ')}</p>`;
                    if(result.coaProvider) metaHTML += `<p>🛡️ <strong style="color:white;">Authentication:</strong> ${result.coaProvider}</p>`;
                    if(result.serialNumber) metaHTML += `<p>🆔 <strong style="color:white;">Serial:</strong> ${result.serialNumber}</p>`;

                    document.getElementById('itemDetail').innerHTML = `
                        <div class="detail-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">
                            <div class="detail-image" style="background:#000; border:2px solid var(--gold); border-radius:10px; position:relative;">
                                <img src="${result.imageUrl}" style="width: 100%; display: block; object-fit:contain; max-height:700px; padding:15px;">
                                ${result.isMatchWorn ? '<span style="position:absolute; top:20px; left:20px; background:#8B0000; color:white; padding:5px 15px; font-weight:900; border-radius:4px; border:1px solid var(--gold); z-index:10;">MATCH USED</span>' : ''}
                            </div>
                            <div class="detail-content">
                                <p class="gold-text" style="font-weight:900; font-size:0.8rem; margin-bottom:10px;">
                                    ${result.itemType ? `<a href="filter.html?type=${encodeURIComponent(result.itemType)}" style="color:inherit; text-decoration:underline;">${result.itemType}</a>` : 'Archive'} 
                                    ${result.year ? `• <a href="filter.html?year=${encodeURIComponent(result.year)}" style="color:inherit; text-decoration:underline;">${result.year}</a>` : ''}
                                </p>
                                <h1 style="color:white; margin-top:5px; margin-bottom:5px;">${result.title}</h1>
                                <div class="detail-athletes" style="margin-bottom:25px; margin-top:10px;">
                                    ${result.athleteNames ? result.athleteNames.map(a => `<a href="filter.html?athlete=${encodeURIComponent(a)}" style="color:var(--gold); font-size:1.3rem; font-weight:700; margin-right:15px; text-decoration:underline;">${a}</a>`).join('') : ''}
                                </div>
                                ${metaHTML ? `<div style="color:var(--gold); padding: 15px; background: rgba(212,175,55,0.05); border-left: 3px solid var(--gold); margin-bottom: 20px; line-height: 1.8;">${metaHTML}</div>` : ''}
                                ${result.description ? `<p style="line-height:1.8; opacity:0.85; margin-top:15px;">${result.description}</p>` : ''}
                            </div>
                        </div>`;

                    // Related Items: Athlete first, then Type
                    let rQuery = "";
                    if (result.athleteNames && result.athleteNames.length > 0) {
                        rQuery = encodeURIComponent(`*[_type == "memorabilia" && "${result.athleteNames[0]}" in sportsmen[]->name && title != "${itemTitle}"][0...6]{ title, "imageUrl": image.asset->url, "athleteNames": sportsmen[]->name }`);
                    } else if (result.itemType) {
                        rQuery = encodeURIComponent(`*[_type == "memorabilia" && itemType->name == "${result.itemType}" && title != "${itemTitle}"][0...6]{ title, "imageUrl": image.asset->url, "athleteNames": sportsmen[]->name }`);
                    }

                    if (rQuery) {
                        const rResp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${rQuery}`);
                        const {result: related} = await rResp.json();
                        if(related && related.length > 0) {
                            document.getElementById('relatedSection').style.display = 'block';
                            document.getElementById('relatedGrid').innerHTML = related.map(i => `
                                <div class="sport-card" style="border: 1px solid rgba(212,175,55,0.1);">
                                    <a href="item.html?name=${encodeURIComponent(i.title)}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%;">
                                        <div style="background:#000; width:100%; height:180px; display:flex; align-items:center; justify-content:center; border-bottom: 2px solid var(--gold);">
                                            <img src="${i.imageUrl}" style="max-width:100%; max-height:100%; object-fit:contain; padding:10px;">
                                        </div>
                                        <div style="padding:15px; flex-grow:1;">
                                            <h3 style="font-size:0.9rem; margin-bottom: 5px;">${i.title}</h3>
                                            <p class="gold-text" style="font-size:0.7rem; font-weight:900;">${(i.athleteNames || []).join(', ').toUpperCase()}</p>
                                        </div>
                                    </a>
                                </div>`).join('');
                        }
                    }
                }
            } catch (e) { console.error("Item Load Error:", e); }
        }
        loadDetail();
    </script>
</body>
</html>
