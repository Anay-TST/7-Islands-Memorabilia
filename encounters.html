<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Encounters | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker" id="dynamic-ticker">LOADING THE ARCHIVE • </div></div>
    </div>
    <div id="navbar-placeholder"></div>

    <div class="section-padding" style="max-width: 1400px; margin: 0 auto; padding-top: 60px;">
        <h1 class="section-title" style="text-align: center; font-size: 2.5rem; margin-bottom: 10px;">BEHIND THE <span class="gold-text">SIGNATURE</span></h1>
        <p style="text-align: center; opacity: 0.6; font-weight: 700; letter-spacing: 2px; margin-bottom: 40px;">THE STORIES BEHIND THE COLLECTION</p>

        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px;">
            <input type="text" id="encSearch" placeholder="Search for a Legend or Sport..." style="padding: 15px 25px; background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 50px; color: white; outline: none; width: 100%; max-width: 500px;">
        </div>

        <div class="sport-grid" id="encounterGrid"></div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
    <script>
        let allEncounters = [];
        async function loadAllEncounters() {
            const query = encodeURIComponent(`*[_type == "encounter"] | order(date desc) {
                title, date, description, videoUrl, "videoFileUrl": videoFile.asset->url, 
                "imageUrl": image.asset->url, "sportName": sport->name, "athleteName": sportsman->name
            }`);
            try {
                const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                const { result } = await resp.json();
                allEncounters = result || [];
                renderEncounters(allEncounters);
                
                document.getElementById('encSearch').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    renderEncounters(allEncounters.filter(enc => {
                        return (enc.title||"").toLowerCase().includes(term) || (enc.athleteName||"").toLowerCase().includes(term) || (enc.sportName||"").toLowerCase().includes(term);
                    }));
                });
            } catch (e) { console.error("Encounters Load Error:", e); }
        }

        function renderEncounters(list) {
            document.getElementById('encounterGrid').innerHTML = list.map(enc => {
                let topMediaHTML = '';
                if (enc.videoFileUrl) {
                    topMediaHTML = `<video controls playsinline style="width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #000; display: block;"><source src="${enc.videoFileUrl}"></video>`;
                } else if (enc.imageUrl) {
                    topMediaHTML = `<img src="${enc.imageUrl}" style="width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #000; display: block;">`;
                }

                let descHTML = '';
                if (enc.description) {
                    const cleanDesc = enc.description.replace(/"/g, '&quot;');
                    // 1 Line Truncation Fix
                    if (enc.description.length > 70) {
                        const shortDesc = enc.description.substring(0, 70) + '...';
                        descHTML = `
                            <div style="font-size:0.85rem; line-height:1.6; opacity:0.85; margin-bottom: 15px;">
                                <span class="desc-short">${shortDesc} <span onclick="this.parentElement.parentElement.querySelector('.desc-short').style.display='none'; this.parentElement.parentElement.querySelector('.desc-full').style.display='inline';" style="color:var(--gold); font-weight:bold; cursor:pointer; text-decoration:underline;">See More</span></span>
                                <span class="desc-full" style="display:none;">${cleanDesc}</span>
                            </div>`;
                    } else {
                        descHTML = `<p style="font-size:0.85rem; line-height:1.6; opacity:0.85; margin-bottom: 15px;">${enc.description}</p>`;
                    }
                }

                return `
                    <div class="sport-card" style="cursor: default; border: 1px solid rgba(212,175,55,0.1);">
                        <div style="padding:0; border-bottom: 2px solid var(--gold); position: relative; overflow:hidden; background: #000; display: flex; align-items: center; justify-content: center;">
                            ${topMediaHTML}
                        </div>
                        <div class="card-info" style="text-align:center; padding: 1.5rem;">
                            <h3 style="color:var(--gold); font-size:1.1rem; margin-bottom:5px;">${enc.title}</h3>
                            <a href="filter.html?athlete=${encodeURIComponent(enc.athleteName)}" style="display:inline-block; color:white; font-size:0.9rem; font-weight:700; margin-bottom:10px; text-decoration:none;">${enc.athleteName}</a><br>
                            ${descHTML}
                        </div>
                    </div>`;
            }).join('');
        }
        document.addEventListener('DOMContentLoaded', loadAllEncounters);
    </script>
</body>
</html>
