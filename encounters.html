<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Encounters | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="hero">
        <h1>BEHIND THE <span class="gold-text">SIGNATURE</span></h1>
        <div class="search-container">
            <input type="text" id="encSearch" placeholder="Search for a Legend or Sport...">
            <button id="clearEncSearch" class="action-btn" style="display:none;">✕ Clear</button>
        </div>
    </section>

    <div class="section-padding">
        <div class="sport-grid" id="encounterGrid">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allEncounters = [];

        async function loadAllEncounters() {
            const query = encodeURIComponent(`*[_type == "encounter"] | order(date desc) {
                title, date, description, videoUrl, 
                "videoFileUrl": videoFile.asset->url, 
                "imageUrl": image.asset->url, 
                "sportName": sport->name,
                "athleteName": sportsman->name
            }`);
            const url = `https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`;
            
            try {
                const resp = await fetch(url);
                const { result } = await resp.json();
                allEncounters = result || [];
                renderEncounters(allEncounters);
                setupEncSearch();
            } catch (e) { console.error("Encounters Load Error:", e); }
        }

        function renderEncounters(list) {
            const grid = document.getElementById('encounterGrid');
            grid.innerHTML = '';
            
            if (list.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:50px;">No encounters found.</p>`;
                return;
            }

            list.forEach(enc => {
                const encCard = document.createElement('div');
                encCard.className = 'sport-card';
                encCard.style.cursor = 'default'; 
                
                let topMediaHTML = '';
                let containerStyle = 'height: 300px;'; 
                
                if (enc.videoFileUrl) {
                    topMediaHTML = `
                        <video controls playsinline style="width: 100%; height: auto; max-height: 500px; object-fit: contain; background: #000; outline: none; border: none; display: block;">
                            <source src="${enc.videoFileUrl}">
                            Your browser does not support the video player.
                        </video>`;
                    containerStyle = 'height: auto; max-height: 500px;'; 
                } else if (enc.imageUrl) {
                    topMediaHTML = `<img src="${enc.imageUrl}" alt="${enc.title}" style="width: 100%; height: 100%; object-fit: cover; padding: 0; display: block;">`;
                } else {
                    topMediaHTML = `<img src="https://via.placeholder.com/400x300/050505/D4AF37?text=Encounter" style="width: 100%; height: 100%; object-fit: cover; display: block;">`;
                }

                let linkHTML = '';
                if (enc.videoUrl && !enc.videoFileUrl) {
                    linkHTML = `<a href="${enc.videoUrl}" target="_blank" style="display:inline-block; margin-top:10px; padding:6px 18px; border:1px solid var(--gold); color:black; background:var(--gold); text-decoration:none; border-radius:50px; font-size:0.8rem; font-weight:bold;">▶ Watch External Video</a>`;
                }

                let descHTML = '';
                if (enc.description) {
                    if (enc.description.length > 120) {
                        const safeDesc = enc.description.replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                        const shortDesc = enc.description.substring(0, 120).replace(/"/g, '&quot;').replace(/'/g, "&#39;") + '...';
                        
                        descHTML = `
                            <div style="font-size:0.85rem; line-height:1.6; opacity:0.85; margin-bottom: 15px;">
                                <span class="desc-short">${shortDesc}</span>
                                <span class="desc-full" style="display:none;">${safeDesc}</span>
                                <span onclick="this.parentElement.querySelector('.desc-short').style.display='none'; this.parentElement.querySelector('.desc-full').style.display='inline'; this.style.display='none';" style="color:var(--gold); font-weight:bold; cursor:pointer; margin-left:5px; white-space:nowrap;">See More</span>
                            </div>`;
                    } else {
                        descHTML = `<p style="font-size:0.85rem; line-height:1.6; opacity:0.85; margin-bottom: 15px;">${enc.description}</p>`;
                    }
                }

                encCard.innerHTML = `
                    <div class="card-image-container" style="${containerStyle} padding:0; border-bottom: 2px solid var(--gold); position: relative; overflow:hidden; background: #000;">
                        ${topMediaHTML}
                        ${enc.sportName ? `<span style="position: absolute; top: 15px; right: 15px; background: var(--gold); color: black; padding: 4px 10px; font-size: 0.6rem; font-weight: 900; border-radius: 4px; z-index: 10;">${enc.sportName}</span>` : ''}
                    </div>
                    <div class="card-info" style="text-align:center; padding: 1.5rem;">
                        <h3 style="color:var(--gold); font-size:1.1rem; margin-bottom:5px;">${enc.title}</h3>
                        ${enc.athleteName ? `<a href="filter.html?athlete=${encodeURIComponent(enc.athleteName)}" style="display:inline-block; color:white; font-size:0.9rem; font-weight:700; margin-bottom:10px; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${enc.athleteName}</a><br>` : ''}
                        ${enc.date ? `<p style="font-size:0.8rem; opacity:0.6; margin-bottom: 10px; display:inline-block;">${enc.date}</p>` : ''}
                        ${descHTML}
                        ${linkHTML}
                    </div>
                `;
                grid.appendChild(encCard);
            });
        }

        function setupEncSearch() {
            const searchInput = document.getElementById('encSearch');
            const clearBtn = document.getElementById('clearEncSearch');
            if (!searchInput) return;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (clearBtn) clearBtn.style.display = term.length > 0 ? "flex" : "none";
                const filtered = allEncounters.filter(enc => {
                    const title = (enc.title || "").toLowerCase();
                    const athlete = (enc.athleteName || "").toLowerCase();
                    const sport = (enc.sportName || "").toLowerCase();
                    return title.includes(term) || athlete.includes(term) || sport.includes(term);
                });
                renderEncounters(filtered);
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = "";
                    clearBtn.style.display = "none";
                    renderEncounters(allEncounters);
                });
            }
        }

        loadAllEncounters();
    </script>
</body>
</html>
