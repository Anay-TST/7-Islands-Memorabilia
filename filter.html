<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtered Results | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker" id="dynamic-ticker">LOADING THE ARCHIVE • </div></div>
    </div>
    
    <div id="navbar-placeholder"></div>
    
    <div class="section-padding" style="max-width: 1400px; margin: 0 auto; padding-top: 60px;">
        <h1 class="section-title" style="text-align: center; font-size: 2.5rem; margin-bottom: 10px;" id="filter-title">ARCHIVE <span class="gold-text">RESULTS</span></h1>
        
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px;">
            <a href="vault" class="see-more-btn">Clear Filters & View Full Vault</a>
        </div>

        <div class="sport-grid six-grid" id="filterGrid">
            <p style="text-align: center; grid-column: 1/-1; opacity: 0.5;">Scanning the archive...</p>
        </div>
    </div>
    
    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
    <script>
        async function loadFilteredData() {
            const params = new URLSearchParams(window.location.search);
            const sport = params.get('sport');
            const athlete = params.get('athlete');
            const team = params.get('team');
            const venue = params.get('venue');
            const year = params.get('year');
            const type = params.get('type');

            let titleText = "Filtered Results";
            if(sport) titleText = sport;
            if(athlete) titleText = athlete;
            if(team) titleText = team;
            if(venue) titleText = venue;
            if(type) titleText = type;

            document.getElementById('filter-title').innerHTML = `<span class="gold-text">${titleText.toUpperCase()}</span> ARCHIVE`;

            const query = encodeURIComponent(`*[_type == "memorabilia"]{ title, year, "imageUrl": image.asset->url, "itemType": itemType->name, "sportNames": sports[]->name, "athleteNames": sportsmen[]->name, "teamNames": teams[]->name, "venueName": venue->name }`);
            try {
                const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                const { result } = await resp.json();
                
                const filtered = result.filter(item => {
                    if(sport && !(item.sportNames || []).includes(sport)) return false;
                    if(athlete && !(item.athleteNames || []).includes(athlete)) return false;
                    if(team && !(item.teamNames || []).includes(team)) return false;
                    if(venue && item.venueName !== venue) return false;
                    if(year && item.year != year) return false;
                    if(type && item.itemType !== type) return false;
                    return true;
                });

                const grid = document.getElementById('filterGrid');
                if (filtered.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">No items found for this category.</p>`;
                    return;
                }
                
                grid.innerHTML = filtered.map(i => `
                    <div class="sport-card" style="border: 1px solid rgba(212,175,55,0.1);">
                        <a href="item?name=${encodeURIComponent(i.title)}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%;">
                            <div style="background:#000; width:100%; height:220px; display:flex; align-items:center; justify-content:center; border-bottom: 2px solid var(--gold);">
                                <img src="${i.imageUrl}" style="max-width:100%; max-height:100%; object-fit:contain; padding:10px;">
                            </div>
                            <div style="padding:15px; flex-grow:1;">
                                <h3 style="font-size:1rem; margin-bottom: 5px;">${i.title}</h3>
                                <p class="gold-text" style="font-size:0.8rem; font-weight:900;">
                                    ${(i.athleteNames || []).join(', ').toUpperCase()}<br>
                                    <span style="opacity:0.6; font-size:0.65rem;">${(i.sportNames || []).join(', ').toUpperCase()}</span>
                                </p>
                            </div>
                        </a>
                    </div>`).join('');
            } catch (e) { console.error("Filter Error:", e); }
        }
        document.addEventListener('DOMContentLoaded', loadFilteredData);
    </script>
</body>
</html>
