<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | 7 Islands</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">7 ISLANDS</div>
            <ul class="nav-links">
                <li><a href="index.html">The Vault</a></li>
                <li><a href="celebrities.html">Legends</a></li>
                <li><a href="index.html#latest">Latest</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="section-padding" style="padding-top:2rem;">
        <h2 class="section-title" id="filterHeading" style="margin-bottom: 2rem; font-size: 1.5rem;">Loading...</h2>
        <div class="sport-grid" id="filterGrid"></div>
    </section>

    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.keys().next().value;
        const val = params.get(type);

        if (type && val) {
            document.title = `${val} Collection | 7 Islands`;
            document.getElementById('filterHeading').innerHTML = `${type.toUpperCase()}: <span class="gold-text" style="font-size:2.5rem; display:block; margin-top:10px;">${val}</span>`;

            async function loadFiltered() {
                let f = "";
                if(type === 'sport') f = `sports[]->name match "${val}"`;
                if(type === 'athlete') f = `sportsmen[]->name match "${val}"`;
                if(type === 'venue') f = `venue->name match "${val}"`;
                if(type === 'team') f = `teams[]->name match "${val}"`;
                if(type === 'type') f = `itemType->name match "${val}"`;
                if(type === 'year') f = `year match "${val}"`; 
                
                const query = encodeURIComponent(`*[_type == "memorabilia" && ${f}]{
                    title, year, "venueName": venue->name, "imageUrl": image.asset->url, "itemType": itemType->name, "sportNames": sports[]->name, "athleteNames": sportsmen[]->name
                }`);
                try {
                    const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                    const {result} = await resp.json();
                    
                    const grid = document.getElementById('filterGrid');
                    if(result && result.length > 0) {
                        result.forEach(item => grid.appendChild(createCard(item)));
                    } else {
                        grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:50px;">No items found for this filter.</p>`;
                    }
                } catch (e) { console.error("Filter Load Error", e); }
            }
            loadFiltered();
        }
    </script>
</body>
</html>
