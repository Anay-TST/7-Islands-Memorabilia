<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Islands Memorabilia | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker">CRICKET • FOOTBALL • TENNIS • NBA • F1 • GOLF • OLYMPICS • BASEBALL • HOCKEY • RUGBY • BOXING • MOTOGP • SQUASH •</div></div>
    </div>

    <header>
        <nav>
            <div class="logo">7 ISLANDS</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
            <ul class="nav-links">
                <li><a href="#latest">Latest</a></li>
                <li><a href="#collection">100+ Sports</a></li>
                <li><a href="#celebrities">Celebrities</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>THE WORLD'S <span class="gold-text">VAULT</span></h1>
            <p>A premier collection of 100+ global sports and legends.</p>
            <div class="search-container">
                <input type="text" id="vaultSearch" placeholder="Search by Sport, Athlete, or Item (e.g. Kohli, World Cup)...">
            </div>
        </div>
    </section>

    <section id="latest" class="latest-section">
        <div class="section-title">
            <h2>NEW <span class="gold-text">ARRIVALS</span></h2>
        </div>
        <div class="sport-grid" id="latestGrid"></div>
    </section>

    <section id="collection" class="gallery">
        <div class="section-title">
            <h2>THE <span class="gold-text">100+</span> VAULT</h2>
        </div>
        <div class="sport-grid" id="sportGrid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
