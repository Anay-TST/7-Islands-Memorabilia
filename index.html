<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Islands Memorabilia | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker" id="dynamic-ticker">LOADING THE ARCHIVE • </div></div>
    </div>
    
    <div id="navbar-placeholder"></div>
    
    <div class="layout-wrapper section-padding">
        <main class="main-content">
            <div class="hero-intro">
                <h1 style="margin-bottom: 0.5rem;" class="mobile-center">THE <span class="gold-text">VAULT</span></h1>
                <p class="hero-subtitle mobile-center">CURATING WORLD SPORTING HISTORY</p>
                <div class="search-container">
                    <input type="text" id="vaultSearch" placeholder="Search Legend, Sport, or Year...">
                </div>
                <div id="sports-icons-row" class="mobile-scroll-row"></div>
            </div>

            <hr class="section-divider">

            <section id="latest">
                <h2 class="section-title mobile-center">NEW <span class="gold-text">ARRIVALS</span></h2>
                <div class="sport-grid" id="latestGrid"></div>
                <div style="text-align: center; margin-top: 30px;">
                    <a href="vault?filter=latest" class="see-more-btn">See All New Arrivals</a>
                </div>
            </section>
            
            <hr class="section-divider">

            <section id="collection">
                <h2 class="section-title mobile-center">THE <span class="gold-text" id="dynamic-vault-count">VAULT</span></h2>
                <div class="sport-grid small-grid" id="sportGrid"></div>
                <div id="see-more-container" style="text-align: center; margin-top: 30px;">
                    <a href="vault" class="see-more-btn">Explore Full Collection</a>
                </div>
            </section>

            <hr class="section-divider">

            <section id="top-legends">
                <h2 class="section-title mobile-center">TOP <span class="gold-text">LEGENDS</span></h2>
                <div id="legends-icons-row" class="mobile-scroll-row"></div>
            </section>

            <hr class="section-divider">

            <section class="insta-section" style="margin-bottom: 2rem;">
                <h2 class="section-title mobile-center">@7ISLANDSMEMORABILIA</h2>
                <script src="https://elfsightcdn.com/platform.js" async></script>
                <div class="elfsight-app-5198fc4c-cd1c-4a89-b39c-4a6f90a3da28" data-elfsight-app-lazy></div>
            </section>
        </main>

        <aside class="sidebar-column">
            <div class="sidebar-sticky-wrap">
                <a href="testimonials" style="text-decoration:none; color:inherit; display:block;" class="sidebar-block">
                    <h2 class="sidebar-label">Testimonials</h2>
                    <div id="testimonial-display"><p style="opacity:0.3; font-size: 0.8rem;">Loading reviews...</p></div>
                </a>
                
                <a href="encounters" style="text-decoration:none; color:inherit; display:block;" class="sidebar-block">
                    <h2 class="sidebar-label">Recent Meetings</h2>
                    <div id="encounter-display"><p style="opacity:0.3; font-size: 0.8rem;">Loading moments...</p></div>
                </a>
            </div>
        </aside>
    </div>
    
    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
