<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Islands Memorabilia | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap"><div class="ticker">CRICKET • FOOTBALL • TENNIS • NBA • F1 • GOLF • OLYMPICS • BASEBALL • HOCKEY • RUGBY • BOXING • MOTOGP • SQUASH •</div></div>
    </div>
    
    <div id="navbar-placeholder"></div>
    
    <section class="hero-split">
        <div class="hero-left">
            <h1>WORLD <span class="gold-text">HISTORY</span></h1>
            <div class="search-container">
                <input type="text" id="vaultSearch" placeholder="Search Athlete, Sport, Year...">
            </div>
        </div>

        <div class="hero-sidebar">
            <div class="sidebar-block">
                <h2 class="sidebar-label">Collector Says</h2>
                <div id="testimonial-display">
                    <p style="opacity:0.3; font-size: 0.8rem;">Loading feedback...</p>
                </div>
            </div>
            <div class="sidebar-block">
                <h2 class="sidebar-label">Moment of History</h2>
                <div id="encounter-display">
                    <p style="opacity:0.3; font-size: 0.8rem;">Loading moment...</p>
                </div>
            </div>
        </div>
    </section>
    
    <div class="category-bar">
        <div class="filter-container">
            <button class="filter-btn active" data-sport="all">🏆 All</button>
            <button class="filter-btn" data-sport="Cricket">🏏 Cricket</button>
            <button class="filter-btn" data-sport="Football">⚽ Football</button>
            <button class="filter-btn" data-sport="Basketball">🏀 NBA</button>
        </div>
    </div>
    
    <section id="latest" class="section-padding">
        <h2 class="section-title">NEW <span class="gold-text">ARRIVALS</span></h2>
        <div class="sport-grid" id="latestGrid"></div>
    </section>

    <section class="insta-section section-padding">
        <h2 class="section-title" style="margin-bottom: 10px;">@7ISLANDSMEMORABILIA</h2>
        <p style="text-align: center; opacity: 0.5; font-size: 0.9rem;">Follow our journey on Instagram</p>
        <div class="insta-grid">
            <a href="https://www.instagram.com/7islandsmemorabilia/" target="_blank" class="insta-post"><img src="https://via.placeholder.com/400" alt="Post"></a>
            <a href="https://www.instagram.com/7islandsmemorabilia/" target="_blank" class="insta-post"><img src="https://via.placeholder.com/400" alt="Post"></a>
            <a href="https://www.instagram.com/7islandsmemorabilia/" target="_blank" class="insta-post"><img src="https://via.placeholder.com/400" alt="Post"></a>
            <a href="https://www.instagram.com/7islandsmemorabilia/" target="_blank" class="insta-post"><img src="https://via.placeholder.com/400" alt="Post"></a>
        </div>
    </section>
    
    <section id="collection" class="section-padding">
        <h2 class="section-title">THE <span class="gold-text">100+</span> VAULT</h2>
        <div class="sport-grid" id="sportGrid"></div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
