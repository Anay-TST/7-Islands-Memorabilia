<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Islands Memorabilia | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-wrap">
            <div class="ticker">CRICKET • FOOTBALL • TENNIS • NBA • F1 • GOLF • OLYMPICS • BASEBALL • HOCKEY • RUGBY • BOXING • MOTOGP • SQUASH •</div>
        </div>
    </div>

    <header>
        <nav>
            <div class="logo">7 ISLANDS</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
            <ul class="nav-links">
                <li><a href="#latest">Latest</a></li>
                <li><a href="#collection">100+ Sports</a></li>
                <li><a href="https://manage.sanity.io" target="_blank">Admin Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>WORLD <span class="gold-text">HISTORY</span></h1>
            <p>The premier collection of 100+ global sports and legends.</p>
            <div class="search-box">
                <input type="text" id="vaultSearch" placeholder="Search by Athlete, Sport, or Item...">
            </div>
        </div>
    </section>

    <div class="category-bar">
        <div class="filter-container">
            <button class="filter-btn active" data-sport="all">🏆 All</button>
            <button class="filter-btn" data-sport="Cricket">🏏 Cricket</button>
            <button class="filter-btn" data-sport="Football">⚽ Football</button>
            <button class="filter-btn" data-sport="F1 Racing">🏎️ F1</button>
            <button class="filter-btn" data-sport="Basketball">🏀 NBA</button>
            <button class="filter-btn" data-sport="Tennis">🎾 Tennis</button>
        </div>
    </div>

    <section id="latest" class="section-padding">
        <div class="section-title"><h2>NEW <span class="gold-text">ARRIVALS</span></h2></div>
        <div class="sport-grid" id="latestGrid"></div>
    </section>

    <section id="collection" class="section-padding">
        <div class="section-title"><h2>THE <span class="gold-text">100+</span> VAULT</h2></div>
        <div class="sport-grid" id="sportGrid"></div>
    </section>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="lightbox-caption"></div>
    </div>

    <button id="backToTop" class="back-to-top" title="Go to top">
        <span class="arrow">↑</span>
        <span class="text">TOP</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
