<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Categories | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="section-padding" style="max-width: 1400px; margin: 0 auto; padding-top: 60px;">
        <h1 class="section-title" style="text-align: center; font-size: 2.5rem; margin-bottom: 10px;">THE <span class="gold-text">SPORTS</span></h1>
        <p style="text-align: center; opacity: 0.6; font-weight: 700; letter-spacing: 2px; margin-bottom: 40px;">BROWSE BY CATEGORY</p>

        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px;">
            <input type="text" id="sportSearch" placeholder="Search for a Sport..." style="padding: 15px 25px; background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 50px; color: white; outline: none; width: 100%; max-width: 500px;">
        </div>

        <div class="sport-grid six-grid" id="sportCategoryGrid"></div>
    </div>

    <script src="script.js"></script>
    <script>
        let allSports = [];

        async function loadSports() {
            const query = encodeURIComponent(`*[_type == "sport" && count(*[_type == "memorabilia" && references(^._id)]) > 0] | order(name asc) {
                name, "imageUrl": image.asset->url, "fallbackImg": *[_type == "memorabilia" && references(^._id)][0].image.asset->url,
                "itemCount": count(*[_type == "memorabilia" && references(^._id)])
            }`);
            try {
                const resp = await fetch(`https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`);
                const { result } = await resp.json();
                allSports = result || [];
                renderSports(allSports);
                setupSportSearch();
            } catch (e) { console.error("Sports Load Error:", e); }
        }

        function renderSports(list) {
            const grid = document.getElementById('sportCategoryGrid');
            grid.innerHTML = '';
            list.forEach(sport => {
                const displayImg = sport.imageUrl || sport.fallbackImg || `https://via.placeholder.com/400x300/050505/D4AF37?text=${encodeURIComponent(sport.name)}`;
                grid.innerHTML += `
                    <div class="sport-card">
                        <a href="filter.html?sport=${encodeURIComponent(sport.name)}" style="text-decoration: none; display: flex; flex-direction: column; height: 100%;">
                            <div style="height:220px; border-bottom: 2px solid var(--gold); overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center;">
                                <img src="${displayImg}" alt="${sport.name}" style="object-fit:cover; width:100%; height: 100%;">
                            </div>
                            <div style="text-align:center; padding: 1.5rem; flex-grow: 1;">
                                <h3 class="gold-text" style="margin-bottom:15px; font-size: 1.2rem; text-transform: uppercase;">${sport.name}</h3>
                                <div style="display:inline-block; background:rgba(212,175,55,0.1); color:var(--gold); padding:6px 16px; border-radius:50px; font-size:0.75rem; font-weight:900;">
                                    ${sport.itemCount} ITEMS
                                </div>
                            </div>
                        </a>
                    </div>`;
            });
        }

        function setupSportSearch() {
            const searchInput = document.getElementById('sportSearch');
            if (!searchInput) return;
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                renderSports(allSports.filter(s => s.name.toLowerCase().includes(term)));
            });
        }
        loadSports();
    </script>
</body>
</html>
