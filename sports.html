<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Categories | 7 Islands Memorabilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="hero">
        <h1>THE <span class="gold-text">SPORTS</span></h1>
        <div class="search-container">
            <input type="text" id="sportSearch" placeholder="Search for a Sport...">
            <button id="clearSportSearch" class="action-btn" style="display:none;">✕ Clear</button>
        </div>
    </section>

    <div class="section-padding">
        <div class="sport-grid" id="sportCategoryGrid">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allSports = [];

        async function loadSports() {
            // Updated to fetch a fallback image from the memorabilia vault!
            const query = encodeURIComponent(`*[_type == "sport"] | order(name asc) {
                name,
                "imageUrl": image.asset->url,
                "fallbackImg": *[_type == "memorabilia" && references(^._id)][0].image.asset->url,
                "itemCount": count(*[_type == "memorabilia" && references(^._id)])
            }`);
            const url = `https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`;
            
            try {
                const resp = await fetch(url);
                const { result } = await resp.json();
                allSports = result || [];
                renderSports(allSports);
                setupSportSearch();
            } catch (e) { console.error("Sports Load Error:", e); }
        }

        function renderSports(list) {
            const grid = document.getElementById('sportCategoryGrid');
            grid.innerHTML = '';
            
            list.forEach(sport => {
                const card = document.createElement('div');
                card.className = 'sport-card';
                
                // Prioritize Official Sport Image -> Then Memorabilia Image -> Then Text Placeholder
                const displayImg = sport.imageUrl || sport.fallbackImg || `https://via.placeholder.com/400x300/050505/D4AF37?text=${encodeURIComponent(sport.name)}`;
                const filterUrl = `filter.html?sport=${encodeURIComponent(sport.name)}`;

                card.innerHTML = `
                    <a href="${filterUrl}" style="text-decoration: none; display: flex; flex-direction: column; height: 100%;">
                        <div class="card-image-container" style="height:250px; border-bottom: 2px solid var(--gold); overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center;">
                            <img src="${displayImg}" alt="${sport.name}" style="object-fit:cover; width:100%; height: 100%; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <div class="card-info" style="text-align:center; padding: 1.5rem; flex-grow: 1;">
                            <h3 class="gold-text" style="margin-bottom:15px; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px;">${sport.name}</h3>
                            <div style="display:inline-block; background:rgba(212,175,55,0.1); color:var(--gold); padding:6px 16px; border-radius:50px; font-size:0.75rem; font-weight:900; text-transform: uppercase;">
                                ${sport.itemCount} ${sport.itemCount === 1 ? 'Archive' : 'Archives'}
                            </div>
                        </div>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        function setupSportSearch() {
            const searchInput = document.getElementById('sportSearch');
            const clearBtn = document.getElementById('clearSportSearch');
            if (!searchInput) return;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (clearBtn) clearBtn.style.display = term.length > 0 ? "flex" : "none";
                const filtered = allSports.filter(s => s.name.toLowerCase().includes(term));
                renderSports(filtered);
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = "";
                    clearBtn.style.display = "none";
                    renderSports(allSports);
                });
            }
        }

        loadSports();
    </script>
</body>
</html>
