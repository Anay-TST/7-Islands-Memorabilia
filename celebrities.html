<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends & Athletes | 7 Islands</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .celeb-img-container {
            width: 100%;
            height: 250px;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--gold);
        }
        .celeb-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .sport-card:hover .celeb-img-container img {
            transform: scale(1.1);
        }
        .celeb-desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 10px 0 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .stats-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">7 ISLANDS</div>
            <ul class="nav-links">
                <li><a href="index.html">The Vault</a></li>
                <li><a href="celebrities.html" class="active">Legends</a></li>
                <li><a href="index.html#latest">Latest</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>THE <span class="gold-text">LEGENDS</span></h1>
        <div class="search-container">
            <input type="text" id="celebSearch" placeholder="Search for a Legend...">
            <button id="clearCelebSearch" class="action-btn" style="display:none;">✕ Clear</button>
        </div>
    </section>

    <div class="section-padding">
        <div class="sport-grid" id="celebGrid">
            </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allCelebrities = [];

        async function loadCelebrities() {
            // Updated GROQ Query: 
            // 1. Gets athlete image
            // 2. Gets athlete description
            // 3. FALLBACK: If athlete has no image, get the image of the first memorabilia linked to them
            const query = encodeURIComponent(`*[_type == "sportsman"] | order(name asc) {
                name,
                description,
                "profileImg": image.asset->url,
                "fallbackImg": *[_type == "memorabilia" && references(^._id)][0].image.asset->url,
                "itemCount": count(*[_type == "memorabilia" && references(^._id)])
            }`);
            const url = `https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`;
            
            try {
                const resp = await fetch(url);
                const { result } = await resp.json();
                allCelebrities = result || [];
                renderCelebrities(allCelebrities);
                setupCelebSearch();
            } catch (e) { console.error("Legends Load Error:", e); }
        }

        function renderCelebrities(list) {
            const grid = document.getElementById('celebGrid');
            grid.innerHTML = '';
            
            list.forEach(celeb => {
                const card = document.createElement('div');
                card.className = 'sport-card';
                card.onclick = () => goToFilter('athlete', celeb.name);
                
                // Use profile image, if null use fallback, if null use a dark placeholder
                const displayImg = celeb.profileImg || celeb.fallbackImg || 'https://via.placeholder.com/400x500/050505/D4AF37?text=7+Islands+Legend';

                card.innerHTML = `
                    <div class="celeb-img-container">
                        <img src="${displayImg}" alt="${celeb.name}">
                    </div>
                    <div class="card-info">
                        <h3 class="gold-text">${celeb.name}</h3>
                        <p class="celeb-desc">${celeb.description || 'A legendary figure in sporting history, featured prominently in our curated vault.'}</p>
                        <div class="stats-badge">${celeb.itemCount} ${celeb.itemCount === 1 ? 'Archive' : 'Archives'}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setupCelebSearch() {
            const searchInput = document.getElementById('celebSearch');
            const clearBtn = document.getElementById('clearCelebSearch');
            if (!searchInput) return;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (clearBtn) clearBtn.style.display = term.length > 0 ? "flex" : "none";
                const filtered = allCelebrities.filter(c => c.name.toLowerCase().includes(term));
                renderCelebrities(filtered);
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = "";
                    clearBtn.style.display = "none";
                    renderCelebrities(allCelebrities);
                });
            }
        }

        loadCelebrities();
    </script>
</body>
</html>
