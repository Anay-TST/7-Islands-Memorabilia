<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legends & Stats | 7 Islands</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">7 ISLANDS</div>
            <ul class="nav-links">
                <li><a href="index.html">The Vault</a></li>
                <li><a href="celebrities.html" class="active">Legends</a></li>
                <li><a href="index.html#latest">Latest</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>THE <span class="gold-text">LEGENDS</span></h1>
        <div class="search-container">
            <input type="text" id="celebSearch" placeholder="Search for a Legend...">
            <button id="clearCelebSearch" class="action-btn" style="display:none;">✕ Clear</button>
        </div>
    </section>

    <div class="section-padding">
        <div class="sport-grid" id="celebGrid">
            </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allCelebrities = [];

        async function loadCelebrities() {
            const query = encodeURIComponent(`*[_type == "sportsman"] | order(name asc) {
                name,
                "itemCount": count(*[_type == "memorabilia" && references(^._id)])
            }`);
            const url = `https://dpcpc70i.api.sanity.io/v2021-10-21/data/query/production?query=${query}`;
            
            try {
                const resp = await fetch(url);
                const { result } = await resp.json();
                allCelebrities = result || [];
                renderCelebrities(allCelebrities);
                setupCelebSearch();
            } catch (e) { 
                console.error("Legends Load Error:", e);
                document.getElementById('celebGrid').innerHTML = "<p>Error loading legends. Please check your connection.</p>";
            }
        }

        function renderCelebrities(list) {
            const grid = document.getElementById('celebGrid');
            grid.innerHTML = '';
            
            if (list.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:50px;">No legends found matching your search.</p>`;
                return;
            }

            list.forEach(celeb => {
                const card = document.createElement('div');
                card.className = 'sport-card';
                card.style.textAlign = 'center';
                card.style.padding = '40px 20px';
                card.onclick = () => goToFilter('athlete', celeb.name);
                
                card.innerHTML = `
                    <h3 class="gold-text" style="margin-bottom:10px;">${celeb.name}</h3>
                    <p style="font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; opacity:0.7; font-weight:700;">
                        ${celeb.itemCount} ${celeb.itemCount === 1 ? 'Archive' : 'Archives'}
                    </p>
                `;
                grid.appendChild(card);
            });
        }

        function setupCelebSearch() {
            const searchInput = document.getElementById('celebSearch');
            const clearBtn = document.getElementById('clearCelebSearch');

            if (!searchInput) return;

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (clearBtn) clearBtn.style.display = term.length > 0 ? "flex" : "none";

                const filtered = allCelebrities.filter(c => 
                    c.name.toLowerCase().includes(term)
                );
                renderCelebrities(filtered);
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = "";
                    clearBtn.style.display = "none";
                    renderCelebrities(allCelebrities);
                });
            }
        }

        loadCelebrities();
    </script>
</body>
</html>
